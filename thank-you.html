<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Hare Krishna Cab Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .thank-you-card {
            background: #ffcc00;
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .thank-you-card i { font-size: 70px; margin-bottom: 20px; }
        .thank-you-card h1 { font-size: 36px; font-weight: 800; margin-bottom: 10px; }
        .thank-you-card p { font-size: 18px; font-weight: 600; margin-bottom: 30px; }
        .back-home {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-home:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="hare.png" alt="Logo">
            <span>Hare Krishna Cab Services</span>
        </div>
    </header>

    <section class="thank-you-section">
        <div class="thank-you-card">
            <i class="fas fa-check-circle"></i>
            <h1>THANK YOU!</h1>
            <p>Your booking request has been received.<br>Our team will connect with you shortly.</p>
            <a href="index.html" class="back-home">Back to Home</a>
            <div style="margin-top: 20px;">
                <p style="font-size: 14px; margin-bottom: 10px;">For urgent booking:</p>
                <a href="tel:6355937272" style="color: #000; font-weight: 800; font-size: 20px;">
                    <i class="fas fa-phone-alt"></i> 6355937272
                </a>
            </div>
        </div>
    </section>

    <footer style="text-align: center; padding: 20px; font-size: 12px; color: #666;">
        &copy; 2026 Hare Krishna Cab Services. Created by JR Digital Studio
    </footer>
</body>
</html>
